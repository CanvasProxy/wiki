site_name: FAQ и База знаний
site_url: https://wiki.canvas-proxy.com

theme:
  name: material
  language: ru
  palette:
    # Настройка для светлой темы
    - scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Темная тема
    # Настройка для темной темы (автоматическое переключение)
    - scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Светлая тема
extra:
  generator: false

# Включаем поддержку раскрывающихся блоков для красивого FAQ
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Главная: index.md
  - 📦 Общие вопросы: general.md
  - 🛡 Обход блокировок: whitelist.md
  - ⚙️ Подключение: connection.md
  - 🛠 Частые проблемы: troubleshooting.md
  - 🎁 Партнерство: referral.md
