site_name: FAQ и База знаний
site_url: https://wiki.canvas-proxy.com

theme:
  name: material
  language: ru
  font:
    text: Inter # Современный шрифт без засечек
    code: JetBrains Mono # Актуальный шрифт для кода
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - content.action.edit
    - content.code.copy
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Темная тема
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Светлая тема

extra_css:
  - stylesheets/custom.css # Подключение кастомного дизайна

extra:
  generator: false

nav:
  - Главная: index.md
